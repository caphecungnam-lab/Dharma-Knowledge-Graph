services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${DKG_API_IMAGE:-dkg-api:prod}
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DKG_API_KEY: ${DKG_API_KEY:?set DKG_API_KEY}
      DKG_RATE_LIMIT_PER_MINUTE: ${DKG_RATE_LIMIT_PER_MINUTE:-120}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - dkg_public
      - dkg_private

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - dkg_private

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - dkg_private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - dkg_private

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dkg_public
      - dkg_private

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - dkg_public
      - dkg_private

networks:
  dkg_public:
  dkg_private:
    internal: true

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:
  prometheus_data:
  grafana_data:
