name: Graph Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  graph-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate and build graph
        run: make check

      - name: Ensure generated files are committed
        run: git diff --exit-code
