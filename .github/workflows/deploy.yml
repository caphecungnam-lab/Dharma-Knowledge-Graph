name: Deploy DKG Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dkg_api/**"
      - "dkg-mvp-frontend/**"
      - "deploy/aws/**"
      - "docker/**"
      - "nginx/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dkg-mvp-frontend/package-lock.json

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Run full checks
        run: make check

      - name: Run safety tests explicitly
        run: python -m unittest tests/test_safety_architecture.py tests/test_safety_guards.py tests/test_e2e_pipeline.py

      - name: Build frontend
        working-directory: dkg-mvp-frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.DKG_PROD_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: dkg-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "BACKEND_IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: dkg-frontend
          IMAGE_TAG: ${{ github.sha }}
          NEXT_PUBLIC_API_URL: ${{ secrets.DKG_PROD_API_URL }}
        run: |
          docker build \
            --file dkg-mvp-frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "FRONTEND_IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Render backend ECS task definition
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/aws/ecs-task-definition.json
          container-name: api
          image: ${{ env.BACKEND_IMAGE_URI }}

      - name: Deploy backend ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: dkg-backend-service
          cluster: dkg-prod
          wait-for-service-stability: true

      - name: Render frontend ECS task definition
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/aws/frontend-task-definition.json
          container-name: frontend
          image: ${{ env.FRONTEND_IMAGE_URI }}

      - name: Deploy frontend ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service: dkg-frontend-service
          cluster: dkg-prod
          wait-for-service-stability: true

      - name: Validate production health endpoint
        env:
          DKG_PROD_HEALTH_URL: ${{ secrets.DKG_PROD_HEALTH_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          url = os.environ["DKG_PROD_HEALTH_URL"]
          with urllib.request.urlopen(url, timeout=20) as response:
              payload = json.loads(response.read().decode("utf-8"))
          assert payload["status"] == "ok", payload
          PY

      - name: Validate production frontend endpoint
        env:
          DKG_PROD_FRONTEND_URL: ${{ secrets.DKG_PROD_FRONTEND_URL }}
        run: |
          python - <<'PY'
          import os
          import urllib.request

          url = os.environ["DKG_PROD_FRONTEND_URL"]
          with urllib.request.urlopen(url, timeout=20) as response:
              assert 200 <= response.status < 400, response.status
          PY
